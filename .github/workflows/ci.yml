name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Up Alire
        uses: alire-project/setup-alire@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev cmake

      - name: Initialize Kafka Test Environment
        run: |
          source ./scripts/kafka_test_common.sh
          init_kafka_test_env
          {
            echo "KAFKA_EXTERNAL_PORT=${KAFKA_EXTERNAL_PORT}"
            echo "ADA_LIBRDKAFKA_BOOTSTRAP_SERVERS=${ADA_LIBRDKAFKA_BOOTSTRAP_SERVERS}"
            echo "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}"
            echo "KAFKA_PORT_LOCK_DIR=${KAFKA_PORT_LOCK_DIR:-}"
          } >> "${GITHUB_ENV}"

      - name: Initialize Build Environment
        run: |
          source ./scripts/kafka_test_common.sh
          init_build_env
          {
            echo "XDG_CONFIG_HOME=${XDG_CONFIG_HOME}"
            echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}"
            echo "TMPDIR=${TMPDIR}"
            echo "LIBRDKAFKA_PREFIX=${LIBRDKAFKA_PREFIX}"
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}"
          } >> "${GITHUB_ENV}"

      - name: Build Vendored Librdkafka
        run: ./scripts/build_librdkafka.sh

      - name: Build Ada Library
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n build

      - name: Build Standalone Unit Tests
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- gprbuild -P tests/ada_librdkafka_tests.gpr

      - name: Build Real Broker Smoke Test
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- gprbuild -P tests/real_broker_smoke.gpr

      - name: Build Real Broker E2E Test
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- gprbuild -P tests/real_broker_e2e.gpr

      - name: Build Real Broker Commit Replay Test
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- gprbuild -P tests/real_broker_commit_replay.gpr

      - name: Run Standalone Unit Tests
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- ./bin/tests_main

      - name: Start Kafka
        run: |
          source ./scripts/kafka_test_common.sh
          require_compose
          compose_cmd up -d

      - name: Wait For Kafka Health
        run: |
          source ./scripts/kafka_test_common.sh
          require_compose
          wait_for_kafka_health

      - name: Run Real Broker Smoke Test
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- ./bin/real_broker_smoke

      - name: Run Real Broker E2E Test
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- ./bin/real_broker_e2e

      - name: Run Real Broker Commit Replay Test
        run: alr -s "${XDG_CONFIG_HOME}/alire" -n exec -- ./bin/real_broker_commit_replay

      - name: Dump Kafka Logs On Failure
        if: failure()
        run: |
          source ./scripts/kafka_test_common.sh
          require_compose
          show_kafka_logs

      - name: Stop Kafka
        if: always()
        run: |
          source ./scripts/kafka_test_common.sh
          require_compose
          cleanup_kafka
